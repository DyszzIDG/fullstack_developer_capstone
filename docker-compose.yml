version: '3.8'

services:
  mongo:
    image: mongo:6
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  express:
    build: ./server/database
    container_name: express-server
    ports:
      - "3030:3030"
    depends_on:
      - mongo
    environment:
      - MONGODB_URI=mongodb://mongo:27017/dealershipsdb

  sentiment:
    build: ./server/sentimentAnalyzer
    container_name: sentiment-analyzer
    ports:
      - "5050:5050"

  django:
    build: ./server
    container_name: django-server
    ports:
      - "8000:8000"
    depends_on:
      - express
      - sentiment

volumes:
  mongo_data:
