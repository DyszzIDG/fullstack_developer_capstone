<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Best Cars Dealership</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f0f1a; color: #f0f0f0; }
    .navbar { background: linear-gradient(135deg, #1a1a2e, #16213e); }
    .navbar-brand { font-weight: 700; color: #6c63ff !important; font-size: 1.4rem; }
    .hero { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 85vh; display:flex; align-items:center; }
    .hero h1 { font-size: 3.5rem; font-weight: 800; }
    .hero h1 span { color: #6c63ff; }
    .btn-primary { background: #6c63ff; border: none; padding: 12px 30px; border-radius: 30px; }
    .btn-primary:hover { background: #5a52e0; }
    .btn-outline-light { border-radius: 30px; padding: 12px 30px; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="/">🚗 Best Cars Dealership</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/static/About.html">About Us</a></li>
          <li class="nav-item"><a class="nav-link" href="/static/Contact.html">Contact Us</a></li>
          <li class="nav-item"><a class="nav-link" href="/djangoapp/get_dealers">View Dealers</a></li>
          <li class="nav-item"><a class="nav-link" href="#" id="loginBtn">Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="hero">
    <div class="container text-center">
      <h1>Welcome to <span>Best Cars</span> Dealership</h1>
      <p class="lead mt-3 mb-5 text-secondary">
        Browse reviews from real customers across all our branches in the United States.
      </p>
      <a href="/djangoapp/get_dealers" class="btn btn-primary me-3">View Dealers</a>
      <a href="/static/About.html" class="btn btn-outline-light">About Us</a>
    </div>
  </section>

  <!-- React root for Login/Register/Dealers -->
  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
