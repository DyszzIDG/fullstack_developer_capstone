version: '3.8'

services:
  mongo:
    image: mongo:6
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  express:
    build: .
    container_name: express-server
    ports:
      - "3030:3030"
    depends_on:
      - mongo
    environment:
      - MONGODB_URI=mongodb://mongo:27017/dealershipsdb

volumes:
  mongo_data:
