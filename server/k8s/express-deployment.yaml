apiVersion: apps/v1
kind: Deployment
metadata:
  name: express-app
  labels:
    app: express-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: express-app
  template:
    metadata:
      labels:
        app: express-app
    spec:
      containers:
      - name: express-app
        image: localhost:5000/express-app:latest
        ports:
        - containerPort: 3030
        env:
        - name: MONGODB_URI
          value: "mongodb://mongo:27017/dealershipsdb"
---
apiVersion: v1
kind: Service
metadata:
  name: express-app
spec:
  ports:
  - port: 3030
    targetPort: 3030
  selector:
    app: express-app
