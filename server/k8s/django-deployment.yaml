apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-app
  labels:
    app: django-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: django-app
  template:
    metadata:
      labels:
        app: django-app
    spec:
      containers:
      - name: django-app
        image: localhost:5000/django-app:latest
        ports:
        - containerPort: 8000
        env:
        - name: BACKEND_URL
          value: "http://express-app:3030"
        - name: SENTIMENT_URL
          value: "http://sentiment-app:5050"
---
apiVersion: v1
kind: Service
metadata:
  name: django-app
spec:
  type: NodePort
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 32000
  selector:
    app: django-app
